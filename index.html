<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCollab Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        // Set worker properly on window load to ensure library is loaded
        window.addEventListener('load', () => {
            if (window.pdfjsLib) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden selection:bg-blue-100 selection:text-blue-700">

    <div id="app" class="h-full w-full relative"></div>

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div id="group-settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Group Settings</h3>
                <button onclick="toggleGroupSettingsModal(false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form onsubmit="handleUpdateGroup(event)" class="space-y-4">
                <input type="hidden" id="edit-group-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Group Name</label>
                    <input id="edit-group-name" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                 <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                    <input id="edit-group-subject" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                
                <div class="pt-2">
                    <button type="button" onclick="toggleGroupSettingsModal(false); toggleMembersModal(true);" class="w-full py-2.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-users"></i> Manage Members
                    </button>
                </div>

                <div class="pt-2 flex flex-col gap-3">
                    <button type="submit" class="w-full py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white shadow-md">Save Changes</button>
                    <button type="button" onclick="handleDeleteGroup()" class="w-full py-2.5 rounded-lg border border-red-200 text-red-600 hover:bg-red-50 transition-colors">Delete Group</button>
                </div>
            </form>
        </div>
    </div>

    <div id="members-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4" onclick="if(event.target === this) toggleMembersModal(false)">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h3 class="font-bold text-slate-800" id="members-modal-title">Members</h3>
                <button onclick="toggleMembersModal(false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <p class="text-xs text-slate-500 mb-3 bg-blue-50 p-2 rounded border border-blue-100 flex items-center gap-2">
                <i class="fas fa-info-circle text-blue-500"></i> <span id="members-modal-subtitle">Loading...</span>
            </p>
            <div id="members-list-content" class="overflow-y-auto space-y-3 flex-1 pr-1">
                <div class="flex justify-center p-4"><div class="loader w-6 h-6 border-slate-200 border-t-blue-500"></div></div>
            </div>
        </div>
    </div>

    <div id="create-group-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl transform transition-all scale-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Create New Group</h3>
                <button onclick="toggleCreateGroupModal(false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form onsubmit="handleCreateGroup(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Group Name</label>
                    <input id="new-group-name" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Advanced Calculus" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                    <input id="new-group-subject" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Mathematics" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Class / Year</label>
                    <input id="new-group-class" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Year 2" required>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="toggleCreateGroupModal(false)" class="flex-1 py-2.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Cancel</button>
                    <button type="submit" class="flex-1 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white shadow-lg">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="note-detail-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4" onclick="if(event.target === this) toggleNoteDetailModal(false)">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        <i class="fas fa-file-alt text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg" id="nd-title">Document Analysis</h3>
                        <p class="text-xs text-slate-500" id="nd-subtitle">Uploaded by User</p>
                    </div>
                </div>
                <button onclick="toggleNoteDetailModal(false)" class="text-slate-400 hover:text-slate-600 bg-white rounded-full p-2 shadow-sm border border-slate-200"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto bg-white flex-1 space-y-6">
                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fas fa-tags text-purple-400"></i> Detected Topics</h4>
                    <div id="nd-topics" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <h4 class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fas fa-align-left"></i> AI Summary</h4>
                    <p id="nd-summary" class="text-slate-700 text-sm leading-relaxed"></p>
                </div>

                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fas fa-list-ul text-emerald-400"></i> Key Points</h4>
                    <ul id="nd-keypoints" class="space-y-2 text-sm text-slate-700 list-disc pl-5"></ul>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t border-slate-100 flex flex-wrap gap-3 justify-end items-center" id="nd-actions">
                <button id="nd-btn-delete" class="mr-auto text-red-500 hover:text-red-700 text-sm font-medium flex items-center gap-1 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors hidden">
                    <i class="fas fa-trash"></i> Delete
                </button>
                <a id="nd-btn-download" href="#" target="_blank" class="hidden px-4 py-2 border border-blue-200 text-blue-600 hover:bg-blue-50 rounded-lg text-sm font-medium transition-colors flex items-center gap-1">
                    <i class="fas fa-download"></i> Download File
                </a>
                <button id="nd-btn-raw" class="px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-100 transition-colors">
                    <i class="fas fa-eye mr-1"></i> View Raw Text
                </button>
                <button id="nd-btn-quiz" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm transition-colors shadow-indigo-200">
                    <i class="fas fa-brain mr-1"></i> Generate Quiz from Doc
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
